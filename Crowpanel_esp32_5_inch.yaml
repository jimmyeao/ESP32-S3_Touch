    # =========================================================================
    # SCREENSAVER — red clock, tap anywhere to wake
    # =========================================================================
    - id: page_screensaver
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - label:
            id: screensaver_clock
            align: CENTER
            text_font: roboto_clock
            text_color: 0xFF3333
            text: "00:00"

        - obj:
            x: 0
            y: 0
            width: 800
            height: 480
            bg_opa: 0%
            border_width: 0
            on_click:
              - globals.set:
                  id: screensaver_active
                  value: "false"
              - light.turn_on:
                  id: backlight
                  brightness: 100%
              - lvgl.widget.show: header_bar
              - if:
                  condition:
                    lambda: "return id(last_page) == 0;"
                  then:
                    - lvgl.page.show: page_climate
              - if:
                  condition:
                    lambda: "return id(last_page) == 1;"
                  then:
                    - lvgl.page.show: page_music
              - if:
                  condition:
                    lambda: "return id(last_page) == 2;"
                  then:
                    - lvgl.page.show: page_lights
              - if:
                  condition:
                    lambda: "return id(last_page) == 3;"
                  then:
                    - lvgl.page.show: page_radio

# =============================================================================
# Fonts — local Roboto files in fonts/ folder + MDI webfont
# =============================================================================
font:
  - file: "fonts/Roboto-Regular.ttf"
    id: roboto18
    size: 18
    bpp: 4
  - file: "fonts/Roboto-Regular.ttf"
    id: roboto20
    size: 20
    bpp: 4
  - file: "fonts/Roboto-Regular.ttf"
    id: roboto24
    size: 24
    bpp: 4
  - file: "fonts/Roboto-Bold.ttf"
    id: roboto30
    size: 30
    bpp: 4
  - file: "fonts/Roboto-Bold.ttf"
    id: roboto36
    size: 36
    bpp: 4
  - file: "fonts/Roboto-Bold.ttf"
    id: roboto72
    size: 72
    bpp: 4
  - file: "fonts/Roboto-Bold.ttf"
    id: roboto_clock
    size: 160
    bpp: 4
    glyphs: "0123456789:"
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_fire
    size: 32
    bpp: 4
    glyphs:
      - "\U000F0238"   # fire (boost)
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_transport
    size: 28
    bpp: 4
    glyphs:
      - "\U000F04AE"   # skip-previous
      - "\U000F040A"   # play
      - "\U000F03E4"   # pause
      - "\U000F04AD"   # skip-next
      - "\U000F0759"   # volume-high (unused, kept for compatibility)
      - "\U000F075D"   # volume-plus
      - "\U000F075E"   # volume-minus
      - "\U000F0581"   # volume-mute