# =============================================================================
# ESPHome Configuration — Elecrow CrowPanel 5.0" ESP32-S3 HMI Display
# =============================================================================
# Hardware: CrowPanel 5.0" (800x480 RGB TFT, ESP32-S3-WROOM-1-N4R8)
# Features: Climate control, music player with Spotify playlists,
#           lighting control, album art, background image, screensaver
#
# GitHub-ready: all Home Assistant entity IDs, URLs, playlist URIs and
# behaviour settings are declared in the substitutions block below.
# Edit ONLY that section to adapt this config for your own setup.
#
# Requires: Home Assistant, fonts in fonts/ folder, background.jpg in HA www/
# =============================================================================

substitutions:

  # ---------------------------------------------------------------------------
  # Device identity
  # ---------------------------------------------------------------------------
  device_name:          "crowpanel"
  friendly_name:        "Crowpanel"
  fallback_ap_ssid:     "Crowpanel Fallback Hotspot"

  # ---------------------------------------------------------------------------
  # Home Assistant base URL
  # Used to prefix relative album-art paths returned by the media player.
  # Must NOT have a trailing slash.  e.g. "http://homeassistant.local:8123"
  # ---------------------------------------------------------------------------
  ha_base_url:  "http://homeassistant.local:8123"

  # ---------------------------------------------------------------------------
  # Background image
  # Served from your HA /local/ folder (put background.jpg in www/).
  # Resize should match your display: 800x480 for the CrowPanel 5"
  # ---------------------------------------------------------------------------
  background_image_url:   "http://homeassistant.local:8123/local/background.jpg"
  background_image_size:  "800x480"

  # ---------------------------------------------------------------------------
  # Album art
  # Size to resize album art to (square). 130x130 works well on this display.
  # ---------------------------------------------------------------------------
  album_art_size:  "130x130"

  # ---------------------------------------------------------------------------
  # Climate
  # ---------------------------------------------------------------------------
  climate_entity:             "climate.thermostat_2"
  climate_boost_sensor:       "binary_sensor.thermostat_2_boost"
  climate_boost_automation:   "automation.thermostat_boost_toggle"

  # ---------------------------------------------------------------------------
  # Media player entity ID
  # ---------------------------------------------------------------------------
  media_player_entity:  "media_player.living_room"

  # ---------------------------------------------------------------------------
  # Lights page — 4 light entity IDs and their button labels
  # ---------------------------------------------------------------------------
  light_1_entity:   "light.living_room_candeo_dimmer"
  light_1_label:    "Living Room"

  light_2_entity:   "light.rear_lounge_candeo_dimmer"
  light_2_label:    "Rear Lounge"

  light_3_entity:   "light.living_room_lights"
  light_3_label:    "Living Side Lights"

  light_4_entity:   "light.kitchen_lights"
  light_4_label:    "Kitchen"

  # ---------------------------------------------------------------------------
  # Playlist & Radio browsers — driven dynamically from Home Assistant
  #
  # In HA you must define (see README):
  #   - input_select.crowpanel_playlists  (options = friendly names)
  #   - input_select.crowpanel_radios     (options = friendly names)
  #   - sensor.crowpanel_playlist_names   (template, joins options with '|')
  #   - sensor.crowpanel_radio_names      (template, joins options with '|')
  #   - script.crowpanel_play_playlist    (field: name → looks up URI, plays)
  #   - script.crowpanel_play_radio       (field: name → looks up URI, plays)
  #
  # The panel shows up to 6 entries from each input_select; reorder/edit
  # them in HA to change what appears here, no reflash required.
  # ---------------------------------------------------------------------------
  playlist_names_sensor:  "sensor.crowpanel_playlist_names"
  playlist_play_script:   "script.crowpanel_play_playlist"

  radio_names_sensor:     "sensor.crowpanel_radio_names"
  radio_play_script:      "script.crowpanel_play_radio"

  # Now-playing art — HA template sensor that returns either a station
  # logo (for radio) or entity_picture (for everything else).
  now_playing_art_sensor: "sensor.crowpanel_now_playing_art"

  # ---------------------------------------------------------------------------
  # Screensaver / sleep timings
  # ---------------------------------------------------------------------------
  screensaver_timeout_s:   "60"     # idle seconds before screensaver activates
  display_off_timeout_s:   "1800"   # idle seconds before backlight turns off
  screensaver_brightness:  "30%"    # backlight level while screensaver is showing

# =============================================================================
# ESPHome core
# =============================================================================
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    board_build.esp-idf.memory_type: qio_opi
    build_flags: "-DBOARD_HAS_PSRAM"
  on_boot:
    priority: -100
    then:
      - lvgl.page.show: page_climate
      - delay: 5s
      - component.update: bg_image
      # Sync light button states once HA connection is established
      - delay: 10s
      - lambda: |-
          if (id(light_1).has_state()) {
            lv_label_set_text(id(light1_status), id(light_1).state ? "ON" : "OFF");
            lv_obj_set_style_bg_color(id(light1_button), lv_color_hex(id(light_1).state ? 0xFFC107 : 0x1A237E), 0);
          }
          if (id(light_2).has_state()) {
            lv_label_set_text(id(light2_status), id(light_2).state ? "ON" : "OFF");
            lv_obj_set_style_bg_color(id(light2_button), lv_color_hex(id(light_2).state ? 0xFFC107 : 0x1A237E), 0);
          }
          if (id(light_3).has_state()) {
            lv_label_set_text(id(light3_status), id(light_3).state ? "ON" : "OFF");
            lv_obj_set_style_bg_color(id(light3_button), lv_color_hex(id(light_3).state ? 0xFFC107 : 0x1A237E), 0);
          }
          if (id(light_4).has_state()) {
            lv_label_set_text(id(light4_status), id(light_4).state ? "ON" : "OFF");
            lv_obj_set_style_bg_color(id(light4_button), lv_color_hex(id(light_4).state ? 0xFFC107 : 0x1A237E), 0);
          }

# =============================================================================
# Hardware — ESP32-S3
# =============================================================================
esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: ${fallback_ap_ssid}
    password: !secret fallback_ap_password

captive_portal:

http_request:
  verify_ssl: false

i2c:
  sda: GPIO19
  scl: GPIO20
  scan: true

# =============================================================================
# Global Variables
# =============================================================================
globals:
  - id: screensaver_active
    type: bool
    initial_value: "false"
  - id: last_page
    type: int
    initial_value: "0"
  - id: radio_page_idx
    type: int
    initial_value: "0"
  - id: playlist_page_idx
    type: int
    initial_value: "0"

# =============================================================================
# Time
# =============================================================================
time:
  - platform: homeassistant
    id: ha_time

# =============================================================================
# Sensors — subscribe to HA entities
# =============================================================================
sensor:
  - platform: homeassistant
    id: thermostat_current_temp
    entity_id: ${climate_entity}
    attribute: current_temperature
    on_value:
      then:
        - lambda: |-
            char buf[32];
            snprintf(buf, sizeof(buf), "%.1f\xC2\xB0""C", x);
            lv_label_set_text(id(current_temp_label), buf);

  - platform: homeassistant
    id: thermostat_target_temp
    entity_id: ${climate_entity}
    attribute: temperature
    on_value:
      then:
        - lambda: |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Target: %.1f\xC2\xB0""C", x);
            lv_label_set_text(id(target_temp_label), buf);

text_sensor:
  - platform: homeassistant
    id: thermostat_mode
    entity_id: ${climate_entity}
    attribute: hvac_action
    on_value:
      then:
        - lambda: |-
            char buf[64];
            snprintf(buf, sizeof(buf), "Mode: %s", x.c_str());
            lv_label_set_text(id(mode_label), buf);

  - platform: homeassistant
    id: media_player_state
    entity_id: ${media_player_entity}
    on_value:
      then:
        - lambda: |-
            const char* state_text = x == "playing" ? "Now Playing" : "Stopped";
            const char* play_icon  = x == "playing" ? "\U000F03E4" : "\U000F040A";
            lv_label_set_text(id(music_state_label), state_text);
            lv_label_set_text(id(radio_state_label), state_text);
            lv_label_set_text(id(music_play_label), play_icon);
            lv_label_set_text(id(radio_play_label), play_icon);

  - platform: homeassistant
    id: media_player_title
    entity_id: ${media_player_entity}
    attribute: media_title
    on_value:
      then:
        - lambda: |-
            lv_label_set_text(id(music_title_label), x.c_str());
            lv_label_set_text(id(radio_title_label), x.c_str());

  - platform: homeassistant
    id: media_player_artist
    entity_id: ${media_player_entity}
    attribute: media_artist
    on_value:
      then:
        - lambda: |-
            lv_label_set_text(id(music_artist_label), x.c_str());
            lv_label_set_text(id(radio_artist_label), x.c_str());

  # Now-playing art — driven by HA template sensor that maps current
  # media_content_id to a station logo for radio, or falls back to
  # the media_player's entity_picture for everything else.
  # Skips the download when the sensor is empty/unknown so we don't
  # hammer flaky HTTPS placeholders during idle.
  - platform: homeassistant
    id: now_playing_art
    entity_id: ${now_playing_art_sensor}
    on_value:
      then:
        - lambda: 'ESP_LOGI("art", "now_playing_art = %s", x.c_str());'
        - if:
            condition:
              lambda: 'return !x.empty() && x != "unknown" && x != "unavailable";'
            then:
              - online_image.set_url:
                  id: album_art
                  url: !lambda |-
                    std::string url = id(now_playing_art).state;
                    if (url.find("http") != 0) {
                      return std::string("${ha_base_url}") + url;
                    }
                    return url;
              - component.update: album_art

  # Pipe-delimited playlist names from HA — re-renders the adaptive
  # / paged layout via the playlist_render script.
  - platform: homeassistant
    id: playlist_names
    entity_id: ${playlist_names_sensor}
    on_value:
      then:
        - script.execute: playlist_render

  # Pipe-delimited radio station names from HA — re-renders the adaptive
  # / paged layout via the radio_render script (see script: section).
  - platform: homeassistant
    id: radio_names
    entity_id: ${radio_names_sensor}
    on_value:
      then:
        - script.execute: radio_render

# =============================================================================
# Binary Sensors — light states, boost indicator, mute state
# =============================================================================
binary_sensor:
  - platform: homeassistant
    id: thermostat_boost
    entity_id: ${climate_boost_sensor}
    on_state:
      then:
        - lambda: |-
            lv_obj_set_style_bg_color(id(boost_button), lv_color_hex(x ? 0xFF6F00 : 0x1A237E), 0);

  - platform: homeassistant
    id: media_muted
    entity_id: ${media_player_entity}
    attribute: is_volume_muted
    on_state:
      then:
        - lambda: |-
            lv_color_t c = lv_color_hex(x ? 0xB71C1C : 0x1A237E);
            lv_obj_set_style_bg_color(id(mute_button), c, 0);
            lv_obj_set_style_bg_color(id(mute_button_radio), c, 0);

  - platform: homeassistant
    id: light_1
    entity_id: ${light_1_entity}
    on_state:
      then:
        - lambda: |-
            lv_label_set_text(id(light1_status), x ? "ON" : "OFF");
            lv_obj_set_style_bg_color(id(light1_button), lv_color_hex(x ? 0xFFC107 : 0x1A237E), 0);

  - platform: homeassistant
    id: light_2
    entity_id: ${light_2_entity}
    on_state:
      then:
        - lambda: |-
            lv_label_set_text(id(light2_status), x ? "ON" : "OFF");
            lv_obj_set_style_bg_color(id(light2_button), lv_color_hex(x ? 0xFFC107 : 0x1A237E), 0);

  - platform: homeassistant
    id: light_3
    entity_id: ${light_3_entity}
    on_state:
      then:
        - lambda: |-
            lv_label_set_text(id(light3_status), x ? "ON" : "OFF");
            lv_obj_set_style_bg_color(id(light3_button), lv_color_hex(x ? 0xFFC107 : 0x1A237E), 0);

  - platform: homeassistant
    id: light_4
    entity_id: ${light_4_entity}
    on_state:
      then:
        - lambda: |-
            lv_label_set_text(id(light4_status), x ? "ON" : "OFF");
            lv_obj_set_style_bg_color(id(light4_button), lv_color_hex(x ? 0xFFC107 : 0x1A237E), 0);

# =============================================================================
# Scripts — radio + playlist browser renderers (adaptive layout + paging)
#
# Each script reads its pipe-delimited names sensor, slices by its page
# global into pages of up to 9, and positions 9 button slots in an
# adaptive grid:
#   1 → centered        4 → 2x2          7 → 3+3+1 centered
#   2 → 1 row 2 cols    5 → 3+2 centered 8 → 3+3+2 centered
#   3 → 1 row 3 cols    6 → 3x2          9 → 3x3
# Paging buttons appear only when total > 9.
# =============================================================================
script:
  - id: radio_render
    then:
      - lambda: |-
          std::string s = id(radio_names).state;
          std::vector<std::string> names;
          size_t pos;
          while ((pos = s.find('|')) != std::string::npos) {
            names.push_back(s.substr(0, pos));
            s.erase(0, pos + 1);
          }
          if (!s.empty()) names.push_back(s);

          const int PER_PAGE = 9;
          int total = (int)names.size();
          int total_pages = total > 0 ? (total + PER_PAGE - 1) / PER_PAGE : 1;

          int page = id(radio_page_idx);
          if (page < 0) page = 0;
          if (page >= total_pages) page = total_pages - 1;
          if (page < 0) page = 0;
          id(radio_page_idx) = page;

          int start = page * PER_PAGE;
          int end_idx = std::min(total, start + PER_PAGE);
          int n = end_idx - start;
          if (n < 0) n = 0;

          lv_obj_t* btns[9] = {
            id(radio_btn_1), id(radio_btn_2), id(radio_btn_3),
            id(radio_btn_4), id(radio_btn_5), id(radio_btn_6),
            id(radio_btn_7), id(radio_btn_8), id(radio_btn_9)};
          lv_obj_t* lbls[9] = {
            id(radio_lbl_1), id(radio_lbl_2), id(radio_lbl_3),
            id(radio_lbl_4), id(radio_lbl_5), id(radio_lbl_6),
            id(radio_lbl_7), id(radio_lbl_8), id(radio_lbl_9)};

          const int Y_TOP = 220;
          const int H_AVAIL = 215;
          const int W_PAGE = 800;
          const int GAP = 10;

          int rows = 0;
          int cols_per_row[3] = {0, 0, 0};
          int btn_w = 246, btn_h = 60;

          if (n == 1)      { rows = 1; cols_per_row[0] = 1; btn_w = 370; }
          else if (n == 2) { rows = 1; cols_per_row[0] = 2; btn_w = 370; }
          else if (n == 3) { rows = 1; cols_per_row[0] = 3; btn_w = 246; }
          else if (n == 4) { rows = 2; cols_per_row[0] = 2; cols_per_row[1] = 2; btn_w = 370; }
          else if (n == 5) { rows = 2; cols_per_row[0] = 3; cols_per_row[1] = 2; btn_w = 246; }
          else if (n == 6) { rows = 2; cols_per_row[0] = 3; cols_per_row[1] = 3; btn_w = 246; }
          else if (n == 7) { rows = 3; cols_per_row[0] = 3; cols_per_row[1] = 3; cols_per_row[2] = 1; btn_w = 246; }
          else if (n == 8) { rows = 3; cols_per_row[0] = 3; cols_per_row[1] = 3; cols_per_row[2] = 2; btn_w = 246; }
          else if (n >= 9) { rows = 3; cols_per_row[0] = 3; cols_per_row[1] = 3; cols_per_row[2] = 3; btn_w = 246; }

          int total_h = rows > 0 ? rows * btn_h + (rows - 1) * GAP : 0;
          int y_start = Y_TOP + (H_AVAIL - total_h) / 2;

          for (int i = 0; i < 9; i++) {
            if (i < n) {
              int row = 0, col_in_row = i, cumsum = 0;
              for (int r = 0; r < rows; r++) {
                if (i < cumsum + cols_per_row[r]) {
                  row = r;
                  col_in_row = i - cumsum;
                  break;
                }
                cumsum += cols_per_row[r];
              }
              int cols_this = cols_per_row[row];
              int row_total_w = cols_this * btn_w + (cols_this - 1) * GAP;
              int row_x_start = (W_PAGE - row_total_w) / 2;
              int x_pos = row_x_start + col_in_row * (btn_w + GAP);
              int y_pos = y_start + row * (btn_h + GAP);

              lv_obj_set_pos(btns[i], x_pos, y_pos);
              lv_obj_set_size(btns[i], btn_w, btn_h);
              lv_obj_set_width(lbls[i], btn_w - 20);
              lv_label_set_text(lbls[i], names[start + i].c_str());
              lv_obj_clear_flag(btns[i], LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_obj_add_flag(btns[i], LV_OBJ_FLAG_HIDDEN);
            }
          }

          if (total > PER_PAGE) {
            char buf[32];
            snprintf(buf, sizeof(buf), "%d / %d", page + 1, total_pages);
            lv_label_set_text(id(radio_page_label), buf);
            lv_obj_clear_flag(id(radio_prev_btn), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(radio_next_btn), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(radio_page_label), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(radio_prev_btn), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(radio_next_btn), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(radio_page_label), LV_OBJ_FLAG_HIDDEN);
          }

  - id: playlist_render
    then:
      - lambda: |-
          std::string s = id(playlist_names).state;
          std::vector<std::string> names;
          size_t pos;
          while ((pos = s.find('|')) != std::string::npos) {
            names.push_back(s.substr(0, pos));
            s.erase(0, pos + 1);
          }
          if (!s.empty()) names.push_back(s);

          const int PER_PAGE = 9;
          int total = (int)names.size();
          int total_pages = total > 0 ? (total + PER_PAGE - 1) / PER_PAGE : 1;

          int page = id(playlist_page_idx);
          if (page < 0) page = 0;
          if (page >= total_pages) page = total_pages - 1;
          if (page < 0) page = 0;
          id(playlist_page_idx) = page;

          int start = page * PER_PAGE;
          int end_idx = std::min(total, start + PER_PAGE);
          int n = end_idx - start;
          if (n < 0) n = 0;

          lv_obj_t* btns[9] = {
            id(playlist_btn_1), id(playlist_btn_2), id(playlist_btn_3),
            id(playlist_btn_4), id(playlist_btn_5), id(playlist_btn_6),
            id(playlist_btn_7), id(playlist_btn_8), id(playlist_btn_9)};
          lv_obj_t* lbls[9] = {
            id(playlist_lbl_1), id(playlist_lbl_2), id(playlist_lbl_3),
            id(playlist_lbl_4), id(playlist_lbl_5), id(playlist_lbl_6),
            id(playlist_lbl_7), id(playlist_lbl_8), id(playlist_lbl_9)};

          const int Y_TOP = 220;
          const int H_AVAIL = 215;
          const int W_PAGE = 800;
          const int GAP = 10;

          int rows = 0;
          int cols_per_row[3] = {0, 0, 0};
          int btn_w = 246, btn_h = 60;

          if (n == 1)      { rows = 1; cols_per_row[0] = 1; btn_w = 370; }
          else if (n == 2) { rows = 1; cols_per_row[0] = 2; btn_w = 370; }
          else if (n == 3) { rows = 1; cols_per_row[0] = 3; btn_w = 246; }
          else if (n == 4) { rows = 2; cols_per_row[0] = 2; cols_per_row[1] = 2; btn_w = 370; }
          else if (n == 5) { rows = 2; cols_per_row[0] = 3; cols_per_row[1] = 2; btn_w = 246; }
          else if (n == 6) { rows = 2; cols_per_row[0] = 3; cols_per_row[1] = 3; btn_w = 246; }
          else if (n == 7) { rows = 3; cols_per_row[0] = 3; cols_per_row[1] = 3; cols_per_row[2] = 1; btn_w = 246; }
          else if (n == 8) { rows = 3; cols_per_row[0] = 3; cols_per_row[1] = 3; cols_per_row[2] = 2; btn_w = 246; }
          else if (n >= 9) { rows = 3; cols_per_row[0] = 3; cols_per_row[1] = 3; cols_per_row[2] = 3; btn_w = 246; }

          int total_h = rows > 0 ? rows * btn_h + (rows - 1) * GAP : 0;
          int y_start = Y_TOP + (H_AVAIL - total_h) / 2;

          for (int i = 0; i < 9; i++) {
            if (i < n) {
              int row = 0, col_in_row = i, cumsum = 0;
              for (int r = 0; r < rows; r++) {
                if (i < cumsum + cols_per_row[r]) {
                  row = r;
                  col_in_row = i - cumsum;
                  break;
                }
                cumsum += cols_per_row[r];
              }
              int cols_this = cols_per_row[row];
              int row_total_w = cols_this * btn_w + (cols_this - 1) * GAP;
              int row_x_start = (W_PAGE - row_total_w) / 2;
              int x_pos = row_x_start + col_in_row * (btn_w + GAP);
              int y_pos = y_start + row * (btn_h + GAP);

              lv_obj_set_pos(btns[i], x_pos, y_pos);
              lv_obj_set_size(btns[i], btn_w, btn_h);
              lv_obj_set_width(lbls[i], btn_w - 20);
              lv_label_set_text(lbls[i], names[start + i].c_str());
              lv_obj_clear_flag(btns[i], LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_obj_add_flag(btns[i], LV_OBJ_FLAG_HIDDEN);
            }
          }

          if (total > PER_PAGE) {
            char buf[32];
            snprintf(buf, sizeof(buf), "%d / %d", page + 1, total_pages);
            lv_label_set_text(id(playlist_page_label), buf);
            lv_obj_clear_flag(id(playlist_prev_btn), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(playlist_next_btn), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(playlist_page_label), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(playlist_prev_btn), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(playlist_next_btn), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(playlist_page_label), LV_OBJ_FLAG_HIDDEN);
          }

# =============================================================================
# Display Configuration — CrowPanel 5" RGB parallel TFT
# =============================================================================
display:
  - platform: rpi_dpi_rgb
    id: my_display
    auto_clear_enabled: false
    invert_colors: true
    update_interval: never
    data_pins:
      red:   [45, 48, 47, 21, 14]
      green: [5, 6, 7, 15, 16, 4]
      blue:  [8, 3, 46, 9, 1]
    de_pin: 40
    hsync_pin: 39
    vsync_pin: 41
    pclk_pin: 0
    pclk_inverted: true
    pclk_frequency: 12MHz
    color_order: RGB
    dimensions:
      width: 800
      height: 480

touchscreen:
  - platform: gt911

# =============================================================================
# Backlight
# =============================================================================
output:
  - platform: ledc
    pin: GPIO2
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON

# =============================================================================
# Online Images
# =============================================================================
online_image:
  # Background image — downloaded once at boot, pushed to all three pages.
  # Place a 800x480 JPEG as background.jpg in your HA www/ folder.
  - id: bg_image
    url: ${background_image_url}
    format: JPEG
    resize: ${background_image_size}
    type: RGB565
    update_interval: never
    on_download_finished:
      - lvgl.image.update:
          id: bg_image_climate
          src: bg_image
      - delay: 500ms
      - lvgl.image.update:
          id: bg_image_music
          src: bg_image
      - delay: 500ms
      - lvgl.image.update:
          id: bg_image_radio
          src: bg_image
      - delay: 500ms
      - lvgl.image.update:
          id: bg_image_lights
          src: bg_image

  # Album art — updated whenever the media player reports a new track.
  - id: album_art
    url: "https://via.placeholder.com/1x1/000000/000000.jpg"
    format: JPEG
    resize: ${album_art_size}
    type: RGB565
    update_interval: never
    on_download_finished:
      - lvgl.image.update:
          id: album_art_widget
          src: album_art
      - lvgl.image.update:
          id: album_art_widget_radio
          src: album_art

# =============================================================================
# Interval — screensaver / display-sleep logic
# =============================================================================
interval:
  - interval: 1s
    then:
      # Update screensaver clock every second while active
      - if:
          condition:
            lambda: "return id(screensaver_active);"
          then:
            - lambda: |-
                auto time = id(ha_time).now();
                if (time.is_valid()) {
                  char buf[16];
                  snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
                  lv_label_set_text(id(screensaver_clock), buf);
                }

      # Turn off display completely after display_off_timeout_s
      - if:
          condition:
            and:
              - lvgl.is_idle:
                  timeout: ${display_off_timeout_s}s
              - light.is_on: backlight
          then:
            - light.turn_off: backlight

      # Activate screensaver after screensaver_timeout_s of no touch
      - if:
          condition:
            and:
              - lambda: "return !id(screensaver_active);"
              - lvgl.is_idle:
                  timeout: ${screensaver_timeout_s}s
          then:
            - globals.set:
                id: screensaver_active
                value: "true"
            - lambda: |-
                auto time = id(ha_time).now();
                if (time.is_valid()) {
                  char buf[16];
                  snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
                  lv_label_set_text(id(screensaver_clock), buf);
                }
            - lvgl.widget.hide: header_bar
            - light.turn_on:
                id: backlight
                brightness: ${screensaver_brightness}
                transition_length: 2s
            - lvgl.page.show: page_screensaver

