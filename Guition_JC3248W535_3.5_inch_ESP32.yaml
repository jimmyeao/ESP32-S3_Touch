    # =========================================================================
    # CLIMATE PAGE — background + temp display + controls
    # =========================================================================
    - id: page_climate
      bg_color: 0x0A0E1A
      widgets:

        # Full-bleed background image
        - image:
            id: bg_image_climate
            src: bg_image
            x: 0
            y: 44

        - button:
            id: boost_btn
            x: 260
            y: 52
            width: 52
            height: 44
            bg_color: 0x1A237E
            bg_opa: 80%
            radius: 8
            widgets:
              - label:
                  text: "\U000F0238"
                  text_font: font_icon
                  text_color: 0xFFFFFF
                  align: CENTER
            on_click:
              - homeassistant.action:
                  action: automation.trigger
                  data:
                    entity_id: ${climate_boost_automation}

        - label:
            id: current_temp_label
            align: CENTER
            y: -90
            text_font: font_xl
            text_color: 0xFFFFFF
            text: "--°C"

        - label:
            text: "Current"
            align: CENTER
            y: -44
            text_font: font_sm
            text_color: 0xCCCCCC

        - label:
            id: target_temp_label
            align: CENTER
            y: -8
            text_font: font_med
            text_color: 0xFFFFFF
            text: "Target: --°C"

        - label:
            id: mode_label
            align: CENTER
            y: 24
            text_font: font_sm
            text_color: 0xCCCCCC
            text: "Mode: --"

        - button:
            x: 8
            y: 316
            width: 140
            height: 80
            bg_color: 0x2196F3
            bg_opa: 80%
            radius: 10
            widgets:
              - label:
                  text: "-"
                  text_font: font_xl
                  text_color: 0xFFFFFF
                  align: CENTER
            on_click:
              - homeassistant.action:
                  action: climate.set_temperature
                  data:
                    entity_id: ${climate_entity}
                  data_template:
                    temperature: !lambda |-
                      return to_string(id(thermostat_target_temp).state - 0.5);

        - button:
            x: 172
            y: 316
            width: 140
            height: 80
            bg_color: 0xF44336
            bg_opa: 80%
            radius: 10
            widgets:
              - label:
                  text: "+"
                  text_font: font_xl
                  text_color: 0xFFFFFF
                  align: CENTER
            on_click:
              - homeassistant.action:
                  action: climate.set_temperature
                  data:
                    entity_id: ${climate_entity}
                  data_template:
                    temperature: !lambda |-
                      return to_string(id(thermostat_target_temp).state + 0.5);

    # =========================================================================
    # SCREENSAVER — red clock, tap anywhere to wake
    # =========================================================================
    - id: page_screensaver
      bg_color: 0x000000
      widgets:

        - label:
            id: screensaver_clock
            align: CENTER
            text_font: font_clock
            text_color: 0xFF3333
            text: "00:00"

        - obj:
            x: 0
            y: 0
            width: 320
            height: 480
            bg_opa: 0%
            border_width: 0
            on_click:
              - globals.set:
                  id: screensaver_active
                  value: "false"
              - light.turn_on:
                  id: backlight
                  brightness: 100%
              - lvgl.widget.show: header_bar
              - lvgl.widget.show: nav_bar
              - if:
                  condition:
                    lambda: "return id(last_page) == 0;"
                  then:
                    - lambda: lv_label_set_text(id(header_title), "${lights_page_title}");
                    - lvgl.page.show: page_lights
              - if:
                  condition:
                    lambda: "return id(last_page) == 1;"
                  then:
                    - lambda: lv_label_set_text(id(header_title), "Music");
                    - lvgl.page.show: page_music
              - if:
                  condition:
                    lambda: "return id(last_page) == 2;"
                  then:
                    - lambda: lv_label_set_text(id(header_title), "Climate");
                    - lvgl.page.show: page_climate

# =============================================================================
# Fonts  (downloaded at build time — no local files needed)
# =============================================================================
font:
  - file: "gfonts://Roboto"
    id: font_sm
    size: 14
  - file: "gfonts://Roboto"
    id: font_med
    size: 18
  - file: "gfonts://Roboto"
    id: font_lg
    size: 22
  - file: "gfonts://Roboto"
    id: font_xl
    size: 48
  - file: "gfonts://Roboto"
    id: font_clock
    size: 96
    glyphs: "0123456789:"
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_icon
    size: 24
    glyphs:
      - "\U000F04AE"   # skip-previous
      - "\U000F040A"   # play
      - "\U000F03E4"   # pause
      - "\U000F04AD"   # skip-next
      - "\U000F075E"   # volume-minus
      - "\U000F0581"   # volume-mute
      - "\U000F075D"   # volume-plus
      - "\U000F0238"   # fire (boost)